<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  background: #0A1628;
  font-family: 'DM Mono', monospace;
  color: #FAFAFA;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  overflow: hidden;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 72px;
  color: #FAFAFA;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
  line-height: 1;
}

.tagline {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: #C8D6E5;
  line-height: 1.3;
  margin-bottom: 40px;
  max-width: 700px;
}

.meta {
  font-size: 14px;
  color: #6B7B8D;
  display: flex;
  gap: 32px;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.amber { color: #E8A020; }

.line {
  width: 60px;
  height: 2px;
  background: #E8A020;
  margin-bottom: 32px;
}
</style>
</head>
<body>
  <div class="logo">FORGE</div>
  <div class="line"></div>
  <div class="tagline">Measuring understanding,<br>not memorization.</div>
  <div class="meta">
    <span class="meta-item">25 categories</span>
    <span class="meta-item">Procedurally generated</span>
    <span class="meta-item">Zero LLM judges</span>
    <span class="meta-item amber">Seed-reproducible</span>
  </div>
</body>
</html>
